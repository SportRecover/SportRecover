<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportRecover - Iniciar Sesión</title>
    <link rel="stylesheet" href="assets/styles/style.css">
    <link rel="stylesheet" href="assets/styles/responsive.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <main>
        <section class="seccion-registro seccion-registro--dividida seccion-registro--centrada">
            <!-- Panel izquierdo: formulario -->
            <div class="registro__panel-formulario">
                <a href="index.html" class="boton-regresar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
                    Volver al inicio
                </a>
                <div class="caja-formulario__marca-logo">
                    <img src="assets/images/logo.png" alt="Logo SportRecover" class="registro__logo">
                </div>
                <h2 class="caja-formulario__titulo">Iniciar <span>Sesión</span></h2>
                <p class="caja-formulario__subtitulo">Ingresa tus credenciales para acceder al seguimiento de tu rehabilitación.</p>

                <form class="registro__formulario" id="loginForm">
                    <input type="email" id="email" class="entrada-formulario" required placeholder="Correo electrónico">
                    <div class="contrasena__contenedor">
                        <input type="password" id="password" class="entrada-formulario" required placeholder="Contraseña">
                        <button type="button" class="contrasena__boton" aria-label="Mostrar contraseña">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <button type="submit" class="boton-primario boton-primario--completo">Ingresar</button>
                    <div class="formulario__divisor">o ingresa con</div>
                    <button type="button" class="boton-google">
                        <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Iniciar con Google
                    </button>
                    <div class="formulario__pie-enlace">¿No tienes una cuenta? <a href="registro.html">Regístrate aquí</a></div>
                </form>
            </div>

        </section>
    </main>

    <footer class="pie-marca">@2026 SportRecover</footer>
    <script src="assets/scripts/main.js"></script>
</body>
</html>
