<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportRecover - Registro</title>
    <link rel="stylesheet" href="assets/styles/style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <img src="assets/images/logo.png" alt="Logo de SportRecover" class="navbar__logo">
            <button class="navbar__toggle" aria-label="Abrir menú">
                <img src="assets/images/Vector.png" alt="Icono de menú" class="navbar__toggle-icon">
            </button>
            <ul class="navbar__menu">
                <li><a href="index.html" class="navbar__link" style="color: #41b34a;">Inicio</a></li>
                <li><a href="nosotros.html" class="navbar__link">Nosotros</a></li>
                <li><a href="testimonios.html" class="navbar__link">Testimonios</a></li>
                <li><a href="contacto.html" class="navbar__link">Contáctanos</a></li>
                <li><a href="login.html" class="navbar__link btn-nav">Iniciar Sesión</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="register-section">
            <div class="register-container">
                <div class="form-box">
                    <div class="form-box__hero">
                        <div class="form-box__text">
                            <div class="form-box__logo">Sport<span>Recover</span></div>
                            <h2 class="form-box__title">Crea tu <span>cuenta</span></h2>
                            <p class="form-box__subtitle">Únete y empieza tu proceso de rehabilitación de forma inteligente y personalizada.</p>
                        </div>
                        <div class="register-image">
                            <img src="assets/images/flaca1.jpg" alt="Deportista">
                        </div>
                    </div>
                    <form class="register-form">
                        <input type="text" id="name" class="form-input" required placeholder="Nombre completo">
                        <input type="email" id="email" class="form-input" required placeholder="Correo electrónico">
                        <input type="password" id="password" class="form-input" required placeholder="Contraseña">
                        <input type="password" id="confirm_password" class="form-input" required placeholder="Confirmar contraseña">
                        <div class="form-checkbox">
                            <input type="checkbox" id="terms" required checked>
                            <label for="terms">Acepto los <a href="#">Términos de Servicio</a> y la <a href="#">Política de Privacidad</a></label>
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%;">Crear cuenta</button>
                        <div class="form-divider">o continúa con</div>
                        <button type="button" class="btn-google"><span style="font-weight:bold;color:#4285F4;">G</span> Registrarse con Google</button>
                        <div class="form-footer-link">¿Ya tienes una cuenta? <a href="login.html" style="color:var(--accent-blue); text-decoration:none; font-weight:600;">Iniciar Sesión</a></div>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <footer class="brand-footer">@2026 SportRecover</footer>
    <script src="assets/scripts/main.js"></script>
</body>
</html>
