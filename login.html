<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SportRecover - Iniciar Sesión</title>
    <link rel="stylesheet" href="public/assets/styles/styleLogin.css" />
</head>
<body>

    <nav class="topheader">
        <a href="" class="logo">
            <img height="60" src="images/logo.png" alt="logo SportRecover">
        </a>

        <ul class="Menu-Horizontal">
            <li><a href="">Inicio</a></li>
            <li><a href="">Servicios</a></li>
            <li><a href="">Fisioterapeutas</a></li>
            <li><a href="index.html">Regístrate</a></li>
        </ul>
    </nav>

    <section class="seccion_login">
        <div class="cont-gral-login">

            <div class="cont-imagen">
                <img src="images/atleta.jpg" alt="Atleta SportRecover">
            </div>

            <div class="cont-formulario">
                <div class="logo-login">
                    <img height="40" src="images/logo.png" alt="logo SportRecover">
                </div>

                <h2>Bienvenido <span class="texto-verde">de vuelta</span></h2>
                <p class="subtitulo">Inicia sesión para continuar con tu proceso de rehabilitación</p>

                <form class="formulario" id="loginForm">
                    <div class="campo">
                        <input type="email" placeholder="Correo electrónico" />
                    </div>

                    <div class="campo">
                        <input type="password" placeholder="Contraseña" />
                    </div>

                    <div class="campo-check">
                        <input type="checkbox" id="recordar" />
                        <label for="recordar">Recordarme</label>
                    </div>

                    <button type="submit" class="btn-login">Iniciar Sesión</button>
                </form>

                <p class="separador">o continúa con</p>

                <button class="btn-google">
                    <img src="https://www.google.com/favicon.ico" width="18" alt="Google">
                    Sign in with Google
                </button>

                <p class="registrate">¿No tienes una cuenta? <a href="index.html">Crear cuenta</a></p>
            </div>

        </div>
    </section>

    <footer class="seccion-footer">
        <div class="cont-gral-footer">
            <p>@2026 SportRecover. Todos los derechos reservados.</p>
        </div>
    </footer>

</body>
</html>
